<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mental Health Screening</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

/* MAIN CARD */
.main-container {
    text-align: center;
    padding: 40px;
    width: 90%;
    max-width: 900px;
}

/* TITLE */
.title {
    font-size: 2.3rem;
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.4;
}

/* SUBTITLE */
.subtitle {
    font-size: 1rem;
    margin-bottom: 40px;
    opacity: 0.8;
}

/* GLASS CARD */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* BUTTONS */
.buttons {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

/* BUTTON STYLE */
.btn {
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

/* PRIMARY BUTTON */
.btn-primary {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
}

/* SECONDARY BUTTON */
.btn-secondary {
    background: linear-gradient(45deg, #ff7e5f, #feb47b);
    color: white;
}

/* HOVER EFFECT */
.btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* FOOTER TEXT */
.footer {
    margin-top: 30px;
    font-size: 0.9rem;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="main-container">

    <h1 class="title">
        Penta Class Classification Of Tweets
    </h1>

    <p class="subtitle">
        Analyze Sentiment from social media text using Deep Learning
    </p>

    <div class="card">

        <div class="buttons">
            <a href="{{ url_for('home') }}" class="btn btn-primary">
                ✍️ Predict Using Text
            </a>

            <a href="{{ url_for('models_view') }}" class="btn btn-secondary">
                📊 View Trained Models
            </a>
        </div>

    </div>

    <div class="footer">
        Stay Aware • Stay Healthy • Stay Strong 💙
    </div>

</div>

</body>
</html>
